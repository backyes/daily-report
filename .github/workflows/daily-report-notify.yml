name: Daily Report Email Notify

# 当 main 分支被 push 到，且改动涉及日报正文 (examples/) 或模板 (prompts/) 时，
# 提取最新的日报摘要并通过 Gmail SMTP 发送到指定邮箱。
# 邮件正文同时带 HTML（手机 / Gmail 优先渲染）和 markdown 纯文本（兜底）。
on:
  push:
    branches:
      - main
    paths:
      # 只监听仓库根下的 examples/ / prompts/，不要把 archive/ 下的归档文件计入
      - 'examples/*.md'
      - 'prompts/*.md'
      - '!archive/**'
  workflow_dispatch:
    inputs:
      target_file:
        description: 'examples/ 下要发送的日报文件名 (留空=自动选最新被改动的)'
        required: false
        default: ''

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install renderer dependencies
        run: |
          python3 -m pip install --quiet --upgrade pip
          python3 -m pip install --quiet markdown

      - name: Build email subject & body (md + html)
        id: build
        env:
          GH_EVENT_NAME: ${{ github.event_name }}
          GH_TARGET_FILE: ${{ github.event.inputs.target_file }}
          GH_REPO: ${{ github.repository }}
          GH_SHA: ${{ github.sha }}
          GH_ACTOR: ${{ github.actor }}
          GH_COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail
          bash .github/scripts/build-summary.sh

      - name: Send email via Gmail SMTP (HTML + markdown fallback)
        # 仅当 build 步骤确认要发送时才走这一步
        if: steps.build.outputs.has_summary == 'true' && steps.build.outputs.body_html != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          from: "Daily Report Bot <${{ secrets.GMAIL_USERNAME }}>"
          to: ${{ secrets.MAIL_TO }}
          subject: ${{ steps.build.outputs.subject }}
          # multipart/alternative：先 text 兜底，再 html 优先渲染
          html_body: file://email_body.html
          body: file://email_body.md
          # 同时把原始 .md / .html 作为附件，方便手机存档
          attachments: email_body.md,email_body.html

      - name: Send email (markdown-only fallback)
        # HTML 渲染失败时的降级路径，避免无邮件
        if: steps.build.outputs.has_summary == 'true' && steps.build.outputs.body_html == ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          from: "Daily Report Bot <${{ secrets.GMAIL_USERNAME }}>"
          to: ${{ secrets.MAIL_TO }}
          subject: ${{ steps.build.outputs.subject }}
          convert_markdown: true
          body: file://email_body.md
